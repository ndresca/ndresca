<svg width="100%" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Andrés Casanova-Aleman — founder and engineer, building Propiedash">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0C0F"/>
      <stop offset="1" stop-color="#100F14"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7A47"/>
      <stop offset="1" stop-color="#F5421E"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6A3D"/>
      <stop offset="1" stop-color="#FF6A3D" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.30" cy="0.52" r="0.55">
      <stop offset="0" stop-color="#FF5A36" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FF5A36" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="20" fill="url(#dots)"/>
  <rect width="1280" height="340" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="338" rx="19" fill="none" stroke="#23232B" stroke-width="1.5"/>

  <!-- live status chip -->
  <g transform="translate(1066 64)">
    <circle cx="0" cy="0" r="5" fill="#FF5A36">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="5" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="2.5" fill="#6E6E78">SHIPPING</text>
  </g>

  <!-- accent bar grows upward -->
  <rect x="80" width="10" rx="5" fill="url(#coral)" y="216" height="0">
    <animate attributeName="y" values="216;96" dur="0.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="height" values="0;120" dur="0.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
  </rect>

  <!-- name: fade + slide in -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.15s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-12 0" to="0 0" dur="0.6s" begin="0.15s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <text x="114" y="178" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-2" fill="#F4F4F5">Andrés Casanova-Aleman</text>
  </g>

  <!-- underline draws in -->
  <line x1="116" y1="202" x2="648" y2="202" stroke="url(#rule)" stroke-width="3" stroke-linecap="round" stroke-dasharray="532" stroke-dashoffset="532">
    <animate attributeName="stroke-dashoffset" values="532;0" dur="0.7s" begin="0.7s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
  </line>

  <!-- role line + blinking cursor -->
  <text x="116" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="21" fill="#8B8B93" opacity="0">founder &amp; engineer · building Propiedash<tspan dx="8" fill="#FF5A36">▋<animate attributeName="opacity" values="1;1;0;0" dur="1.1s" begin="1.4s" repeatCount="indefinite" keyTimes="0;0.5;0.5;1"/></tspan>
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.95s" fill="freeze"/>
  </text>

  <!-- now ticker -->
  <text x="80" y="300" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13.5" letter-spacing="0.3" fill="#5B5B63" opacity="0">▸ now — scaling Propiedash across Venezuela · automating reviews with AI
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.15s" fill="freeze"/>
  </text>
</svg>
