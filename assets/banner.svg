<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Andrés Casanova-Aleman — founder, engineer, AI-native operator. Systems online: Propiedash, Autoplier, AI agents. Status: shipping.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#0B0B0E"/>
      <stop offset="1" stop-color="#0F0E13"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7A47"/>
      <stop offset="1" stop-color="#F5421E"/>
    </linearGradient>
    <linearGradient id="coralH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7A4F"/>
      <stop offset="1" stop-color="#E8431D"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF5A36" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FF5A36" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.24" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#FF5A36" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FF5A36" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#FFFFFF" fill-opacity="0.035"/>
    </pattern>
    <clipPath id="t0"><rect x="62" y="234" width="0" height="26"><animate attributeName="width" values="0;360" begin="0.70s" dur="0.52s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="t1"><rect x="62" y="267" width="0" height="26"><animate attributeName="width" values="0;400" begin="1.30s" dur="0.55s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="t2"><rect x="62" y="300" width="0" height="26"><animate attributeName="width" values="0;400" begin="1.92s" dur="0.55s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="t3"><rect x="62" y="333" width="0" height="26"><animate attributeName="width" values="0;420" begin="2.54s" dur="0.58s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="t4"><rect x="62" y="366" width="0" height="26"><animate attributeName="width" values="0;420" begin="3.18s" dur="0.58s" fill="freeze" calcMode="linear"/></rect></clipPath>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="440" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="440" rx="20" fill="url(#dots)"/>
  <rect width="1280" height="440" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="438" rx="19" fill="none" stroke="#23232B" stroke-width="1.5"/>

  <!-- window chrome -->
  <circle cx="32" cy="31" r="6.5" fill="#FF5F57"/>
  <circle cx="54" cy="31" r="6.5" fill="#FEBC2E"/>
  <circle cx="76" cy="31" r="6.5" fill="#28C840"/>
  <text x="104" y="36" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" fill="#6A6A74">andres@operator &#160;·&#160; ~/casanova-aleman</text>
  <text x="1182" y="36" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="2" fill="#6A6A74">ONLINE</text>
  <circle cx="1200" cy="31" r="5" fill="#28C840"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <line x1="0" y1="60" x2="1280" y2="60" stroke="#1C1C24" stroke-width="1.5"/>

  <!-- accent bar -->
  <rect x="40" width="9" rx="4.5" fill="url(#coral)" y="184" height="0">
    <animate attributeName="y" values="184;108" dur="0.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="height" values="0;76" dur="0.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
  </rect>

  <!-- name -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.15s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-12 0" to="0 0" dur="0.6s" begin="0.15s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <text x="64" y="160" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="52" font-weight="800" letter-spacing="-1.8" fill="#F4F4F5">Andrés Casanova-Aleman</text>
  </g>
  <text x="66" y="196" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="17" letter-spacing="0.3" fill="#8A8A93" opacity="0">founder · engineer · AI-native operator
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.85s" fill="freeze"/>
  </text>

  <!-- boot log -->
  <text clip-path="url(#t0)" x="64" y="252" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="16.5"><tspan fill="#FF5A36">❯ </tspan><tspan fill="#7C7C86">boot operator </tspan><tspan fill="#37373F">············· </tspan><tspan fill="#28C840">ok</tspan></text>
  <text clip-path="url(#t1)" x="64" y="285" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="16.5"><tspan fill="#FF5A36">❯ </tspan><tspan fill="#7C7C86">propiedash </tspan><tspan fill="#37373F">················ </tspan><tspan fill="#FF7A4F">● live</tspan></text>
  <text clip-path="url(#t2)" x="64" y="318" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="16.5"><tspan fill="#FF5A36">❯ </tspan><tspan fill="#7C7C86">autoplier </tspan><tspan fill="#37373F">················· </tspan><tspan fill="#FF7A4F">● live</tspan></text>
  <text clip-path="url(#t3)" x="64" y="351" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="16.5"><tspan fill="#FF5A36">❯ </tspan><tspan fill="#7C7C86">ai agents </tspan><tspan fill="#37373F">················· </tspan><tspan fill="#28C840">● online</tspan></text>
  <text clip-path="url(#t4)" x="64" y="384" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="16.5"><tspan fill="#FF5A36">❯ </tspan><tspan fill="#7C7C86">status </tspan><tspan fill="#37373F">···················· </tspan><tspan fill="#FF7A4F" font-weight="700">SHIPPING</tspan></text>
  <rect x="468" y="370" width="10" height="19" fill="#FF5A36" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.76s" fill="freeze"/>
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" begin="3.8s" repeatCount="indefinite" keyTimes="0;0.5;0.5;1"/>
  </rect>

  <!-- signal monitor panel -->
  <rect x="748" y="88" width="470" height="320" rx="14" fill="#0A0A0F" stroke="#23232B" stroke-width="1.5"/>
  <text x="772" y="122" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" letter-spacing="2.5" fill="#5B5B63">▌ SHIP ACTIVITY</text>
  <text x="1194" y="122" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11" letter-spacing="1.5" fill="#FF7A4F">● LIVE</text>

  <!-- monitor gridlines -->
  <line x1="772" y1="190" x2="1194" y2="190" stroke="#18181F" stroke-width="1"/>
  <line x1="772" y1="250" x2="1194" y2="250" stroke="#18181F" stroke-width="1"/>
  <line x1="772" y1="310" x2="1194" y2="310" stroke="#18181F" stroke-width="1"/>

  <!-- area + waveform -->
  <path d="M772,300 C806,250 842,250 876,300 S946,360 982,300 S1052,238 1088,300 S1158,250 1194,300 L1194,366 L772,366 Z" fill="url(#area)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="2.2s" fill="freeze"/>
  </path>
  <path id="wave" d="M772,300 C806,250 842,250 876,300 S946,360 982,300 S1052,238 1088,300 S1158,250 1194,300" fill="none" stroke="url(#coralH)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1000" stroke-dashoffset="1000">
    <animate attributeName="stroke-dashoffset" values="1000;0" dur="2.0s" begin="0.9s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.3 0.7 0.3 1"/>
  </path>

  <!-- traveling pulse -->
  <circle r="11" fill="#FF5A36" opacity="0">
    <animate attributeName="opacity" values="0;0.22;0" dur="3.6s" begin="3s" repeatCount="indefinite"/>
    <animateMotion dur="3.6s" begin="3s" repeatCount="indefinite" calcMode="linear"><mpath xlink:href="#wave"/></animateMotion>
  </circle>
  <circle r="4.5" fill="#FFB59E" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="3.6s" begin="3s" repeatCount="indefinite"/>
    <animateMotion dur="3.6s" begin="3s" repeatCount="indefinite" calcMode="linear"><mpath xlink:href="#wave"/></animateMotion>
  </circle>

  <!-- legend -->
  <g font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.6s" fill="freeze"/>
    <circle cx="776" cy="382" r="3.5" fill="#FF7A4F"/>
    <text x="786" y="386" fill="#7C7C86">propiedash</text>
    <circle cx="900" cy="382" r="3.5" fill="#FF7A4F"/>
    <text x="910" y="386" fill="#7C7C86">autoplier</text>
    <circle cx="1014" cy="382" r="3.5" fill="#28C840"/>
    <text x="1024" y="386" fill="#7C7C86">ai agents</text>
  </g>
</svg>
